# ==============================================================================
# MediGenius - application.properties
# Equivalent of backend/app/core/config.py (.env driven) in the Python project
# ==============================================================================

spring.application.name=medigenius-backend
server.port=8000

# ── Database (MySQL) ─────────────────────────────────────────────────────────
# Replaces SQLite (storage/chat_db/medigenius.db) from db/session.py
spring.datasource.url=jdbc:mysql://localhost:3306/medigenius?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Paths (mirrors LOG_DIR / VECTOR_STORE_DIR / PDF_PATH) ───────────────────
medigenius.storage.log-dir=${LOG_DIR:./logs}
medigenius.storage.vector-store-dir=${VECTOR_STORE_DIR:./storage/vector_store}
medigenius.storage.pdf-path=C:/Users/DELL/Downloads/medical_book.pdf
# ── LLM Provider selection ───────────────────────────────────────────────────
# Supported values: openai | groq | ollama
# "openai" now points at OpenRouter's OpenAI-compatible endpoint by default (see
# medigenius.llm.openai.base-url below) and is the default provider for this app.
medigenius.llm.provider=${LLM_PROVIDER:openai}
medigenius.llm.model-name=openrouter/auto
medigenius.llm.temperature=${LLM_TEMPERATURE:0.3}
medigenius.llm.max-tokens=${LLM_MAX_TOKENS:2048}

# OpenAI-compatible provider (default: OpenRouter).
# SECURITY: the API key is never hardcoded - it is read from the OPENROUTER_API_KEY
# env var (or OPENAI_API_KEY-style secret store) at startup. Set it in your
# shell/.env/deployment secrets before running the app.
medigenius.llm.openai.api-key=${OPENROUTER_API_KEY:}
medigenius.llm.openai.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}

# Groq (optional alternative provider, OpenAI-compatible endpoint) - no longer the default.
# Set medigenius.llm.provider=groq to opt back into it.
medigenius.llm.groq.api-key=${GROQ_API_KEY:}
medigenius.llm.groq.base-url=https://api.groq.com/openai/v1

# Ollama (optional local provider)
medigenius.llm.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
medigenius.llm.ollama.model-name=${OLLAMA_MODEL_NAME:llama3.1}

# ── RAG / Vector store ───────────────────────────────────────────────────────
# In-memory vector store (dev.langchain4j InMemoryEmbeddingStore) - no external service or
# Docker container required. Rebuilt from the configured PDF at boot; see VectorStoreConfig.
medigenius.rag.top-k=3
medigenius.rag.chunk-size=512
medigenius.rag.chunk-overlap=128
medigenius.rag.min-valid-chars=50

# ── Wikipedia fallback ───────────────────────────────────────────────────────
medigenius.wikipedia.base-url=https://en.wikipedia.org/w/api.php
medigenius.wikipedia.top-k-results=2
medigenius.wikipedia.max-doc-chars=2000
medigenius.wikipedia.min-valid-chars=100

# ── Tavily fallback ──────────────────────────────────────────────────────────
medigenius.tavily.api-key=${TAVILY_API_KEY:}
medigenius.tavily.base-url=https://api.tavily.com/search
medigenius.tavily.max-results=3
medigenius.tavily.min-valid-chars=50

# ── Conversation memory ──────────────────────────────────────────────────────
medigenius.chat.max-history-turns=20
medigenius.chat.history-context-window=5
medigenius.chat.executor-context-window=3

# ── JWT / Security (new: replaces Python's cookie-only anonymous session) ──
medigenius.jwt.secret=${JWT_SECRET:CHANGE_ME_32_BYTE_MINIMUM_SECRET_KEY_FOR_HS256_XXXXXXXXXX}
medigenius.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
medigenius.jwt.header-name=X-Session-Token
medigenius.session.header-name=X-Session-ID

# ── User Authentication JWT (Feature 1/3 - separate from the anonymous jwt block above) ──
medigenius.auth.jwt-secret=${AUTH_JWT_SECRET:CHANGE_ME_ANOTHER_32_BYTE_MINIMUM_SECRET_KEY_XXXXXXXXXX}
medigenius.auth.jwt-expiration-ms=${AUTH_JWT_EXPIRATION_MS:86400000}
medigenius.auth.upload-dir=${PDF_UPLOAD_DIR:./uploads}

# ── CORS (mirrors allow_origins=["*"] in Python main.py) ────────────────────
medigenius.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.medigenius=INFO
logging.file.name=${medigenius.storage.log-dir}/medigenius.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %-5level - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5

# ── Multipart (kept in case future file-upload endpoints are added) ────────
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
